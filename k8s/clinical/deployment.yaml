apiVersion: apps/v1
kind: Deployment
metadata:
  name: clinical
  namespace: hms
spec:
  replicas: 2
  selector:
    matchLabels:
      app: clinical
  template:
    metadata:
      labels:
        app: clinical
    spec:
      containers:
      - name: clinical
        image: eucastan001/clinical:latest
        ports:
        - containerPort: 4002
        resources:
          requests:
            cpu: "250m"
            memory: "256Mi"
          limits:
            cpu: "600m"
            memory: "512Mi"
        envFrom:
        - configMapRef:
            name: clinical-config
        - secretRef:
            name: clinical-secrets
        livenessProbe:
          httpGet:
            path: /liveness
            port: 4002
          initialDelaySeconds: 20
          periodSeconds: 10
          timeoutSeconds: 5
        readinessProbe:
          httpGet:
            path: /readiness
            port: 4002
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 5
apiVersion: apps/v1
kind: Deployment
metadata:
  name: payment
  labels:
    app: payment
  namespace: hms
spec:
  replicas: 2
  selector:
    matchLabels:
      app: payment
  template:
    metadata:
      labels:
        app: payment
    spec:
      containers:
        - name: payment
          image: eucastan001/payment:latest
          ports:
            - containerPort: 4005
          resources:
            limits:
              cpu: "500m"
              memory: "256Mi"
            requests:
              cpu: "250m"
              memory: "128Mi"
          envFrom:
            - configMapRef:
                name: payment-config
            - secretRef:
                name: payment-secrets
          livenessProbe:
            httpGet:
              path: /liveness
              port: 4005
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /readiness
              port: 4005
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 5

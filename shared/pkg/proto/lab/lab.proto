syntax = "proto3";

package lab.v1;

option go_package = "github.com/Eucastan/hms/shared/pkg/proto/lab;labpb";

service LabService {
    rpc CreateLabTestRequest(CreateLabRequest) returns (LabResponse);
    rpc GetLabTestRequests(GetLabRequestsRequest) returns (GetLabRequestsResponse);
    rpc UpdateLabTestRequest(UpdateLabRequest) returns (LabResponse);
    rpc DeleteLabTestRequest(DeleteLabRequest) returns (LabResponse);

    rpc GetLabTestResult(GetLabResultRequest) returns (LabResultResponse);
}

message LabTestRequest {
    string id           = 1;
    string patient_id   = 2;
    string request_by   = 3;
    string test_type    = 4;
    string priority     = 5;
    string status       = 6;
    string notes        = 7;
    string created_at   = 8; // ISO string or google.protobuf.Timestamp
}

message LabResult {
    string PerformedBy = 1;   
	string PatientID = 2;
	string RequestBy = 3; 
	string TestType = 4; 
	string ResultValue = 5;  
	string Unit = 6;
	string ReferenceRange = 7;
	string Comments = 8;
	bool   Verified = 9;  
}

message CreateLabRequest {
    string patient_id   = 1;
    string request_by   = 2;
    string test_type    = 3;
    string priority     = 4;
    string status       = 5;
    string notes        = 6;
}

message GetLabRequestsRequest {
    string patient_id = 1;
}

message GetLabRequestsResponse {
    repeated LabTestRequest requests = 1;
}

message UpdateLabRequest {
    string id = 1;
    string request_by = 2;
    string test_type = 3;
    string priority = 4;
    string status = 5;
    string notes = 6;
}

message DeleteLabRequest {
    string id = 1;
}

message LabResponse {
    string status = 1;
    string message = 2;
}

message GetLabResultRequest {
    string patient_id = 1;
}

message LabResultResponse {
    repeated LabResult results = 1;
}